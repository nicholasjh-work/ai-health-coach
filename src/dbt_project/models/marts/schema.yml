version: 2

models:
  - name: mart_coaching_context
    description: "One row per active member with latest biometrics, trends, engagement, and coaching priority score."
    columns:
      - name: member_id
        tests: [unique, not_null]
      - name: coaching_priority_score
        tests:
          - not_null
          - accepted_values:
              values: [0, 30, 50, 60, 70, 80, 95]
      - name: segment
        tests:
          - accepted_values:
              values: ['power', 'active', 'casual']

  - name: mart_cohort_retention
    description: "Weekly cohort retention at 7, 14, 30, 60, 90 day windows by plan type, channel, and segment."
    columns:
      - name: cohort_week
        tests: [not_null]
      - name: cohort_size
        tests:
          - not_null

  - name: mart_ai_evaluation
    description: "AI-generated coaching insights with quality scores from evaluation model."
    columns:
      - name: evaluation_id
        tests: [unique, not_null]
      - name: composite_score
        description: "Average of relevance, specificity, actionability, safety (0-100)"
